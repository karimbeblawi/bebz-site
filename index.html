<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Link Your Device</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: #121a2b;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 20px;
      margin-bottom: 20px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border-radius: 6px;
      border: none;
      outline: none;
      background: #1c253a;
      color: white;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #3b82f6;
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    #msg {
      margin-top: 12px;
      font-size: 14px;
      text-align: center;
      color: #9ca3af;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Link Your TV</h1>

    <form id="linkForm">
      <input id="device_id" placeholder="Device ID" required />
      <input id="playlist_name" placeholder="Playlist Name (optional)" />
      <input id="playlist_url" placeholder="Portal URL (http://example.com:8080)" required />
      <input id="username" placeholder="Username" required />
      <input id="password" placeholder="Password" required />
      <button type="submit">Link Device</button>
    </form>

    <div id="msg"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://qsmuvkwhrzbydncdiphu.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_GXoX0HbGSg4njByYEmRPAw_B7sRBLDI';

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const form = document.getElementById('linkForm');
    const msg = document.getElementById('msg');

    const deviceIdInput = document.getElementById('device_id');
    const playlistNameInput = document.getElementById('playlist_name');
    const playlistUrlInput = document.getElementById('playlist_url');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');

    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name) || '';
    }

    // 🔥 Auto-fill device ID from QR
    const codeFromUrl = getQueryParam('code').trim().toUpperCase();
    if (codeFromUrl !== '') {
      deviceIdInput.value = codeFromUrl;
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      msg.textContent = 'Sending...';

      const payload = {
        device_id: deviceIdInput.value.trim().toUpperCase(),
        playlist_name: playlistNameInput.value.trim(),
        playlist_url: playlistUrlInput.value.trim(),
        username: usernameInput.value.trim(),
        password: passwordInput.value.trim()
      };

      if (!payload.device_id || !payload.playlist_url) {
        msg.textContent = 'Device ID and Portal URL are required.';
        return;
      }

      if (
        !payload.playlist_url.startsWith('http://') &&
        !payload.playlist_url.startsWith('https://')
      ) {
        msg.textContent = 'Portal URL must start with http:// or https://';
        return;
      }

      const { error } = await supabaseClient
        .from('device_links')
        .insert([payload]);

      if (error) {
        msg.textContent = 'Error: ' + error.message;
        return;
      }

      msg.textContent = 'Success. Return to your TV.';

      form.reset();

      // keep device id if QR was used
      if (codeFromUrl !== '') {
        deviceIdInput.value = codeFromUrl;
      }
    });
  </script>
</body>
</html>
